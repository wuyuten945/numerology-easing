<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數字易經分析</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <nav class="tabs">
      <button class="tab-btn active" data-tab="auto">個人分析</button>
      <button class="tab-btn" data-tab="manual">進階分析</button>
      <button class="tab-btn" data-tab="recommend">智能建議</button>
    </nav>

    <main>
      <section id="tab-auto" class="tab-panel active">
        <form id="form-auto" class="form-grid" autocomplete="off">
          <label>身分證字號<input type="text" name="id" placeholder="如 A123456789" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
          <label>電話<input type="text" name="phone" placeholder="如 0912345678" autocomplete="off" inputmode="numeric"></label>
          <label>車牌（4 位數字）<input type="text" name="license" placeholder="如 1234" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
          <div class="form-actions"><button type="submit">分析</button></div>
        </form>
        <div id="result-auto" class="result"></div>
      </section>

      <section id="tab-manual" class="tab-panel">
        <p class="form-hint">輸入 1～3 組號碼，系統合併後計算交互作用（增長 / 抵銷）的最終結果。</p>
        <form id="form-manual" class="form-grid" autocomplete="off">
          <label>號碼 1<input type="text" name="input1" placeholder="如 13311331" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
          <label>號碼 2<input type="text" name="input2" placeholder="如 0912345678" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
          <label>號碼 3<input type="text" name="input3" placeholder="如 A1234" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
          <div class="form-actions"><button type="submit">分析</button></div>
        </form>
        <div id="result-manual" class="result"></div>
      </section>

      <section id="tab-recommend" class="tab-panel">
        <p class="form-hint">建議內容會自動讀取「個人分析」結果，避開您身上已有的凶星、加強對應的吉星。請先到個人分析頁完成身分證／電話／車牌的分析。</p>
        <form id="form-recommend" class="form-grid" autocomplete="off">
          <label>用途
            <select name="purpose">
              <option value="phone">電話</option>
              <option value="license">車牌</option>
              <option value="pin">PIN 或密碼</option>
            </select>
          </label>
          <label>長度<input type="number" name="length" value="10" min="2" max="12" autocomplete="off"></label>
          <label>開頭<input type="text" name="prefix" value="09" placeholder="如 09" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
          <div class="form-actions"><button type="submit">推薦</button></div>
        </form>
        <div id="result-recommend" class="result"></div>
      </section>
    </main>
  </div>

  <!-- ─── Footer 法遵連結 ──────────────────── -->
  <footer class="legal-footer">
    <div class="legal-links">
      <button type="button" data-legal="personal-data">個人資料蒐集告知</button>
      <button type="button" data-legal="privacy">隱私權政策</button>
      <button type="button" data-legal="cookie">Cookie 政策</button>
      <button type="button" data-legal="minor">未成年保護</button>
      <button type="button" data-legal="disclaimer">使用警語</button>
    </div>
    <div class="legal-copy">© 2026 數字易經分析　·　本系統僅供參考，不構成任何決策依據</div>
  </footer>

  <!-- ─── Cookie 同意條 ────────────────────── -->
  <div id="cookie-banner" class="cookie-banner" hidden>
    <div class="cookie-text">
      本網站使用必要 Cookie 以維持基本功能與記住您的語言偏好。繼續使用即視為同意。
      <button type="button" data-legal="cookie" class="cookie-link">了解更多</button>
    </div>
    <button type="button" id="cookie-accept" class="cookie-accept">我同意</button>
  </div>

  <!-- ─── 法遵內容 Modal ──────────────────── -->
  <div id="legal-modal" class="legal-modal" hidden>
    <div class="legal-modal-backdrop" data-close></div>
    <div class="legal-modal-card">
      <div class="legal-modal-head">
        <h2 id="legal-modal-title"></h2>
        <button type="button" class="legal-close" data-close aria-label="關閉">✕</button>
      </div>
      <div id="legal-modal-body" class="legal-modal-body"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/legal.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
